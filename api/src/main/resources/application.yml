server:
  port: ${PORT:8080}   # Cloud Run은 PORT 환경변수를 주입

ml:
  base-url: ${ML_BASE_URL:http://localhost:8000}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-3.1-flash-lite   # 답변 짧고 빠르게 (3.5-flash는 thinking으로 느림)

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: benefit-compass-api
